{% extends "base.html" %}
{% block title %}Job match · Job Application Tracker{% endblock %}
{% block content %}
<header class="page-header">
  <h1 class="page-title">Job match</h1>
  <p class="page-lead">Rank active jobs by how well your skills match.</p>
</header>

<div class="card">
  <h2 class="card__title">Your skills</h2>
  <div class="form-field">
    <label for="skills-input">List skills</label>
    <span class="hint">Separate with commas or new lines.</span>
    <textarea
      id="skills-input"
      rows="4"
      placeholder="Python, SQL, Flask"
    ></textarea>
  </div>
  <div class="toolbar toolbar--flush">
    <button type="button" class="btn btn--primary" id="btn-run-match">
      Find matches
    </button>
  </div>
</div>

<div id="match-results" class="card" hidden>
  <h2 class="card__title">Results</h2>
  <div id="match-table-wrap"></div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/job_match.js') }}"></script>
{% endblock %}
