{% extends "base.html" %}
{% block title %}Dashboard · Job Application Tracker{% endblock %}
{% block content %}
<header class="page-header">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-lead">Snapshot of your search.</p>
</header>

<section class="card" aria-labelledby="stats-heading">
  <h2 id="stats-heading" class="visually-hidden">Statistics</h2>
  <div id="dashboard-stats" class="loading">Loading statistics…</div>
</section>

<section class="card" aria-labelledby="status-heading">
  <h2 id="status-heading" class="card__title">Applications by status</h2>
  <div id="dashboard-by-status" class="loading">Loading…</div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
